name: Release

# Fires on any tag like v0.1.0, v1.2.3, etc. Builds + pushes the backend
# and frontend images to GitHub Container Registry (ghcr.io) and creates
# a GitHub Release with autogenerated notes.
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to (re)release, e.g. v0.1.0'
        required: true

permissions:
  contents: write   # required to create the Release
  packages: write   # required to push to ghcr.io

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  build-and-push:
    name: Build & push ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            context: ./backend
            image: llm-wiki-backend
          - service: frontend
            context: ./frontend
            image: llm-wiki-frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.image }}
          # Produces: :vX.Y.Z, :X.Y.Z, :X.Y, :latest (latest only on stable tags)
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ !contains(github.ref, '-') }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max

  release:
    name: Create GitHub Release
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for the changelog generator

      - name: Resolve tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          generate_release_notes: true
          body: |
            ## Docker images

            Backend  → `ghcr.io/${{ github.repository_owner }}/llm-wiki-backend:${{ steps.tag.outputs.name }}`
            Frontend → `ghcr.io/${{ github.repository_owner }}/llm-wiki-frontend:${{ steps.tag.outputs.name }}`

            Pull and run:

            ```bash
            docker pull ghcr.io/${{ github.repository_owner }}/llm-wiki-backend:${{ steps.tag.outputs.name }}
            docker pull ghcr.io/${{ github.repository_owner }}/llm-wiki-frontend:${{ steps.tag.outputs.name }}
            ```

            See the repo README for a `docker-compose.yml` snippet that uses the published images instead of local builds.
